<style>
  :root{
    --ink:#16242E;
    --blueprint:#1F4E66;
    --blueprint-deep:#15394C;
    --paper:#EEF3F6;
    --card:#FFFFFF;
    --line:#C7DCE6;
    --tape:#D9714B;
    --tape-deep:#BD5B38;
    --sage:#5B8266;
    --sage-pale:#E5EEE6;
    --muted:#6E8392;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:920px;margin:0 auto;padding:24px 16px 0;}

  /* ---- Title block ---- */
  .titleblock{
    background:var(--blueprint);
    color:#fff;
    border:2px solid var(--blueprint-deep);
    border-radius:6px;
    position:relative;
    overflow:hidden;
  }
  .titleblock::before,.titleblock::after{
    content:"";position:absolute;width:14px;height:14px;
    border:2px solid rgba(255,255,255,.55);
  }
  .titleblock::before{top:8px;left:8px;border-right:none;border-bottom:none;}
  .titleblock::after{bottom:8px;right:8px;border-left:none;border-top:none;}
  .tb-inner{padding:22px 26px 18px;}
  .tb-eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:#9FC4D6;margin:0 0 6px;
  }
  .tb-title{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(22px,5vw,32px);margin:0 0 4px;line-height:1.15;
  }
  .tb-subtitle{font-size:13.5px;color:#BFD7E3;margin:0 0 16px;}
  .tb-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    border-top:1px solid rgba(255,255,255,.25);
  }
  .tb-cell{padding:12px 16px;border-right:1px solid rgba(255,255,255,.25);}
  .tb-cell:last-child{border-right:none;}
  .tb-cell-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#9FC4D6;margin:0 0 4px;}
  .tb-cell-value{font-size:18px;font-weight:600;margin:0;}
  .tb-progress-row{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.25);}
  .tb-progress-track{
    height:8px;border-radius:5px;background:rgba(255,255,255,.18);
    overflow:hidden;border:1px solid rgba(255,255,255,.3);
  }
  .tb-progress-fill{
    height:100%;background:var(--tape);width:0%;
    transition:width .3s ease;
  }
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:none;border:none;color:var(--blueprint);
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
    padding:4px 0;margin-bottom:12px;
  }
  .back-btn:hover{text-decoration:underline;}

  /* ---- Home cards ---- */
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;}
  @media (max-width:560px){.home-grid{grid-template-columns:1fr;}}
  .home-card{
    text-align:left;border:1.5px solid var(--line);background:var(--card);
    border-radius:10px;padding:18px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;gap:8px;width:100%;
  }
  .home-card:hover{border-color:var(--blueprint);}
  .home-card:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  .home-card-top{display:flex;justify-content:space-between;align-items:center;}
  .home-card-num{color:var(--tape-deep);font-size:13px;font-weight:600;}
  .home-card-emoji{font-size:28px;line-height:1;}
  .home-card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;margin:0;color:var(--ink);}
  .home-card-sub{font-size:13px;color:var(--muted);margin:0;}
  .home-card-progress-track{height:6px;border-radius:4px;background:var(--paper);border:1px solid var(--line);overflow:hidden;margin-top:4px;}
  .home-card-progress-fill{height:100%;background:var(--sage);}
  .home-card-stat{font-size:11px;color:var(--muted);margin:2px 0 0;}

  /* ---- Toolbar ---- */
  .toolbar{
    position:sticky;top:0;z-index:5;
    background:var(--paper);
    padding:14px 0;margin-top:18px;
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    border-bottom:1px solid var(--line);
  }
  .search-input{
    flex:1 1 200px;padding:10px 14px;border:1.5px solid var(--blueprint);
    border-radius:6px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);
  }
  .search-input:focus{outline:2px solid var(--tape);outline-offset:1px;}
  .pill-group{display:flex;gap:6px;}
  .pill{
    border:1.5px solid var(--blueprint);background:transparent;color:var(--blueprint);
    padding:9px 13px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
    font-family:inherit;
  }
  .pill[aria-pressed="true"]{background:var(--blueprint);color:#fff;}
  .pill:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  .btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .btn{
    border:1.5px solid var(--blueprint);background:var(--card);color:var(--blueprint);
    padding:8px 13px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;
  }
  .btn:hover{background:var(--blueprint);color:#fff;}
  .btn.tape{border-color:var(--tape-deep);color:var(--tape-deep);}
  .btn.tape:hover{background:var(--tape);color:#fff;border-color:var(--tape);}
  .btn:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  #importInput{display:none;}

  /* ---- Categories ---- */
  .category{
    background:var(--card);border:1.5px solid var(--line);border-radius:8px;
    margin-top:16px;overflow:hidden;
  }
  .cat-header{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;cursor:pointer;background:#F7FAFB;
    border-bottom:1px solid var(--line);user-select:none;
  }
  .cat-header-left{display:flex;align-items:baseline;gap:12px;}
  .cat-num{color:var(--tape-deep);font-size:13px;font-weight:600;}
  .cat-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin:0;}
  .cat-count{font-size:12px;color:var(--muted);white-space:nowrap;}
  .cat-chevron{transition:transform .2s ease;color:var(--blueprint);flex-shrink:0;}
  .category.collapsed .cat-chevron{transform:rotate(-90deg);}
  .category.collapsed .cat-body{display:none;}

  .cat-body{padding:6px 10px 14px;}
  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;}
  @media (max-width:560px){.item-grid{grid-template-columns:1fr;}}

  .item-row{
    display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:6px;
  }
  .item-row.hidden{display:none;}
  .item-row:hover{background:var(--sage-pale);}
  .item-checkbox{
    appearance:none;width:19px;height:19px;flex-shrink:0;
    border:2px solid var(--blueprint);border-radius:4px;cursor:pointer;
    position:relative;background:var(--card);
  }
  .item-checkbox:checked{background:var(--sage);border-color:var(--sage);}
  .item-checkbox:checked::after{
    content:"";position:absolute;left:5px;top:1px;width:5px;height:9px;
    border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(40deg);
  }
  .item-checkbox:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  .item-label{font-size:14.5px;cursor:pointer;flex:1;line-height:1.35;}
  .item-row.checked .item-label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sage);}
  .item-remove{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;
    padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0;
  }
  .item-remove:hover{color:var(--tape-deep);background:#fbeae3;}

  .add-row{
    display:flex;gap:8px;padding:10px 8px 4px;margin-top:4px;border-top:1px dashed var(--line);
  }
  .add-input{
    flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;
  }
  .add-input:focus{outline:none;border-color:var(--blueprint);}
  .add-btn{
    border:1.5px solid var(--blueprint);background:var(--card);color:var(--blueprint);
    border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .add-btn:hover{background:var(--blueprint);color:#fff;}

  .empty-msg{
    text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;display:none;
  }

  footer{
    max-width:920px;margin:30px auto 0;padding:0 16px;color:var(--muted);
    font-size:12.5px;text-align:center;
  }

  @media print{
    .toolbar,.add-row,.item-remove,.cat-chevron,.back-btn{display:none !important;}
    .category.collapsed .cat-body{display:block !important;}
    .titleblock{background:#fff !important;color:#000 !important;border-color:#000;}
    .tb-eyebrow,.tb-cell-label,.tb-subtitle{color:#444 !important;}
    body{background:#fff;}
  }
</style>

]},
    {id:"btcc", title:"BTCC Weekend", subtitle:"Race day, sorted", emoji:"\uD83C\uDFC1", dbPath:"checklist_btcc/state", categories: [
  {id:"tickets-docs", name:"Tickets & Documents", items:["Race weekend tickets","Paddock / pit walk passes","Parking pass","Programme (or pre-order online)","Travel directions / satnav set","Accommodation confirmation (if staying over)","ID (if collecting tickets on the gate)"]},
  {id:"weather-gear", name:"Weather & Comfort", items:["Waterproof jacket","Umbrella","Sunscreen","Cap or hat","Sunglasses","Folding camping chair","Picnic blanket","Extra layer / fleece","Wellies or sturdy shoes","Poncho (backup for sudden rain)"]},
  {id:"trackside-kit", name:"Trackside Kit", items:["Ear defenders / earplugs","Binoculars","Camera with zoom lens","Spare camera battery / memory card","Portable radio (for live commentary)","Race day programme & pen","Trackside scanner (optional)","Foam seat cushion"]},
  {id:"food-drink", name:"Food & Drink", items:["Water bottles","Packed lunch / snacks","Flask of hot drink (if early start)","Cool bag with ice packs","Cash for trackside food stalls","Card for payments"]},
  {id:"essentials", name:"General Essentials", items:["Portable phone charger","Phone charging cable","First aid kit / plasters","Hand sanitiser","Tissues","Bin bag (for rubbish, keeps car tidy)","Spare face mask (if needed)","Earplugs for kids if bringing them"]},
  {id:"car-travel", name:"Car & Travel", items:["Full tank of fuel / charged EV","Breakdown cover details","Car parking change/coins","Tyre pressure check","Sat nav postcode for circuit saved","Pack snacks for the drive","Travel sweets"]}
]},
    {id:"lego", title:"Lego Minifigure Collection", subtitle:"Track every figure you own", emoji:"\uD83E\uDDF1", dbPath:"checklist_lego/state", categories: [
  {id:"city", name:"City", items:["Police Officer","Firefighter","Construction Worker","Postal Worker","Doctor","Astronaut","Pilot","Train Conductor","Farmer","Diver"]},
  {id:"star-wars", name:"Star Wars", items:["Luke Skywalker","Darth Vader","Han Solo","Princess Leia","Chewbacca","Obi-Wan Kenobi","Yoda","Stormtrooper","Boba Fett","R2-D2","C-3PO","Kylo Ren"]},
  {id:"superheroes", name:"Marvel & DC Superheroes", items:["Spider-Man","Iron Man","Batman","Superman","Wonder Woman","Captain America","Hulk","Thor","Black Widow","Joker","Wolverine","Deadpool"]},
  {id:"ninjago", name:"Ninjago", items:["Kai","Jay","Cole","Zane","Lloyd","Nya","Sensei Wu"]},
  {id:"harry-potter", name:"Harry Potter", items:["Harry Potter","Hermione Granger","Ron Weasley","Albus Dumbledore","Severus Snape","Hagrid","Voldemort","Draco Malfoy"]},
  {id:"collectible-series", name:"Collectible Minifigures Series", items:["Series figure 1","Series figure 2","Series figure 3","Series figure 4","Series figure 5"]},
  {id:"other", name:"Other / Custom Figures", items:["Mystery / unidentified figure","Custom built figure"]}
]}
  ];

  var listById = Object.create(null);
  LISTS.forEach(function(l){ listById[l.id] = l; });

  var state = Object.create(null);
  var dbRefs = Object.create(null);
  var connected = Object.create(null);

  LISTS.forEach(function(l){
    state[l.id] = {checked: Object.create(null), custom: Object.create(null)};
    l.categories.forEach(function(c){ state[l.id].custom[c.id] = []; });
    connected[l.id] = false;
    if(firebaseEnabled){
      try{ dbRefs[l.id] = firebase.database().ref(l.dbPath); }catch(e){ console.error(e); }
    }
  });

  var view = { screen: "home", collapsed: Object.create(null), search: "", filter: "all" };

  var homeScreenEl = document.getElementById("homeScreen");
  var listScreenEl = document.getElementById("listScreen");
  var homeCardsEl = document.getElementById("homeCards");
  var catListEl = document.getElementById("catList");
  var emptyMsgEl = document.getElementById("emptyMsg");

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(ch){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[ch];
    });
  }

  function allItemsOf(list, cat){
    var base = cat.items.map(function(name, i){ return {id: cat.id + "-" + i, name: name}; });
    return base.concat(state[list.id].custom[cat.id] || []);
  }

  function totalsFor(listId){
    var list = listById[listId];
    var total = 0, checked = 0;
    list.categories.forEach(function(cat){
      allItemsOf(list, cat).forEach(function(item){
        total++;
        if(state[listId].checked[item.id]) checked++;
      });
    });
    return {total:total, checked:checked};
  }

  function setSyncStatus(text){
    var el = document.getElementById("syncStatus");
    if(el) el.textContent = text;
  }

  function refreshSyncStatusForCurrent(){
    if(view.screen === "home") return;
    if(!firebaseEnabled){ setSyncStatus("Not connected — local only"); return; }
    setSyncStatus(connected[view.screen] ? "Connected — receiving live updates" : "Connecting…");
  }

  function matchesSearch(name){
    if(!view.search) return true;
    return name.toLowerCase().indexOf(view.search) !== -1;
  }
  function matchesFilter(isChecked){
    if(view.filter === "all") return true;
    if(view.filter === "checked") return isChecked;
    return !isChecked;
  }

  function renderHome(){
    var html = "";
    var grandTotal = 0, grandChecked = 0;
    LISTS.forEach(function(list, i){
      var t = totalsFor(list.id);
      grandTotal += t.total; grandChecked += t.checked;
      var pct = t.total ? Math.round((t.checked / t.total) * 100) : 0;
      html += '<button class="home-card" type="button" data-open="' + list.id + '">' +
                '<div class="home-card-top">' +
                  '<span class="home-card-num mono">' + String(i + 1).padStart(2, "0") + '</span>' +
                  '<span class="home-card-emoji">' + list.emoji + '</span>' +
                '</div>' +
                '<h2 class="home-card-title">' + escapeHtml(list.title) + '</h2>' +
                '<p class="home-card-sub">' + escapeHtml(list.subtitle) + '</p>' +
                '<div class="home-card-progress-track"><div class="home-card-progress-fill" style="width:' + pct + '%"></div></div>' +
                '<p class="home-card-stat mono">' + t.checked + '/' + t.total + ' done</p>' +
              '</button>';
    });
    homeCardsEl.innerHTML = html;
    document.getElementById("homeStatLists").textContent = LISTS.length;
    document.getElementById("homeStatTotal").textContent = grandTotal;
    document.getElementById("homeStatChecked").textContent = grandChecked;
    var overallPct = grandTotal ? Math.round((grandChecked / grandTotal) * 100) : 0;
    document.getElementById("homeStatPercent").textContent = overallPct + "%";
    document.getElementById("homeProgressFill").style.width = overallPct + "%";
  }

  function renderList(){
    var listId = view.screen;
    var list = listById[listId];
    if(!list) return;
    var st = state[listId];

    document.getElementById("listEmoji").textContent = list.emoji;
    document.getElementById("listTitleText").textContent = list.title;
    document.getElementById("listSubtitleText").textContent = list.subtitle;

    var html = "";
    var totalAll = 0, checkedAll = 0;
    var anyVisible = false;

    list.categories.forEach(function(cat, ci){
      var items = allItemsOf(list, cat);
      var collapsed = !!view.collapsed[cat.id];
      var catChecked = 0;
      var rows = "";
      var visibleInCat = 0;

      items.forEach(function(item){
        var isChecked = !!st.checked[item.id];
        totalAll++;
        if(isChecked){ checkedAll++; catChecked++; }
        var visible = matchesSearch(item.name) && matchesFilter(isChecked);
        if(visible){ visibleInCat++; anyVisible = true; }
        var isCustom = item.id.indexOf(cat.id + "-custom-") === 0;
        rows += '<div class="item-row ' + (isChecked ? "checked " : "") + (visible ? "" : "hidden") + '" data-id="' + item.id + '">' +
                  '<input type="checkbox" class="item-checkbox" id="cb-' + item.id + '" ' + (isChecked ? "checked" : "") + ' aria-label="' + escapeHtml(item.name) + '">' +
                  '<label class="item-label" for="cb-' + item.id + '">' + escapeHtml(item.name) + '</label>' +
                  (isCustom ? '<button class="item-remove" type="button" data-remove="' + item.id + '" aria-label="Remove ' + escapeHtml(item.name) + '">&times;</button>' : "") +
                '</div>';
      });

      var catNum = String(ci + 1).padStart(2, "0");
      html += '<div class="category ' + (collapsed ? "collapsed" : "") + '" data-cat="' + cat.id + '">' +
                '<div class="cat-header" data-toggle="' + cat.id + '">' +
                  '<div class="cat-header-left">' +
                    '<span class="cat-num mono">' + catNum + '</span>' +
                    '<h2 class="cat-name">' + escapeHtml(cat.name) + '</h2>' +
                  '</div>' +
                  '<div style="display:flex;align-items:center;gap:10px;">' +
                    '<span class="cat-count mono">' + catChecked + '/' + items.length + '</span>' +
                    '<svg class="cat-chevron" width="14" height="14" viewBox="0 0 14 14"><path d="M2 4l5 6 5-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                  '</div>' +
                '</div>' +
                '<div class="cat-body">' +
                  '<div class="item-grid">' + rows + '</div>' +
                  '<form class="add-row" data-add="' + cat.id + '">' +
                    '<input class="add-input" type="text" placeholder="Add your own item…" aria-label="Add item to ' + escapeHtml(cat.name) + '">' +
                    '<button class="add-btn" type="submit">Add</button>' +
                  '</form>' +
                '</div>' +
              '</div>';
    });

    catListEl.innerHTML = html;
    emptyMsgEl.style.display = anyVisible ? "none" : "block";

    document.getElementById("statCategories").textContent = list.categories.length;
    document.getElementById("statTotal").textContent = totalAll;
    document.getElementById("statChecked").textContent = checkedAll;
    var pct = totalAll ? Math.round((checkedAll / totalAll) * 100) : 0;
    document.getElementById("statPercent").textContent = pct + "%";
    document.getElementById("progressFill").style.width = pct + "%";
  }

  function showHome(){
    view.screen = "home";
    homeScreenEl.style.display = "";
    listScreenEl.style.display = "none";
    if(location.hash) history.replaceState(null, "", location.pathname + location.search);
    renderHome();
  }

  function showList(listId){
    if(!listById[listId]){ showHome(); return; }
    view.screen = listId;
    view.collapsed = Object.create(null);
    view.search = "";
    view.filter = "all";
    document.getElementById("searchInput").value = "";
    document.querySelectorAll(".pill").forEach(function(p){
      p.setAttribute("aria-pressed", p.getAttribute("data-filter") === "all" ? "true" : "false");
    });
    homeScreenEl.style.display = "none";
    listScreenEl.style.display = "";
    location.hash = listId;
    renderList();
    refreshSyncStatusForCurrent();
  }

  function pushState(listId){
    var ref = dbRefs[listId];
    if(!ref){
      if(view.screen === listId) setSyncStatus("Not connected — local only");
      return;
    }
    if(view.screen === listId) setSyncStatus("Saving…");
    ref.set({checked: state[listId].checked, custom: state[listId].custom}).then(function(){
      if(view.screen === listId) setSyncStatus("Saved \u2713 " + new Date().toLocaleTimeString());
    }).catch(function(err){
      if(view.screen === listId) setSyncStatus("Save failed: " + (err && err.message ? err.message : err));
      console.error("Sync to Firebase failed:", err);
    });
  }

  // Subscribe to every list's data immediately, regardless of which screen is showing.
  LISTS.forEach(function(list){
    var ref = dbRefs[list.id];
    if(!ref) return;
    ref.on("value", function(snapshot){
      var data = snapshot.val() || {};
      state[list.id].checked = data.checked || Object.create(null);
      state[list.id].custom = data.custom || Object.create(null);
      list.categories.forEach(function(c){ if(!state[list.id].custom[c.id]) state[list.id].custom[c.id] = []; });
      connected[list.id] = true;
      if(view.screen === "home") renderHome();
      else if(view.screen === list.id){ renderList(); refreshSyncStatusForCurrent(); }
    }, function(err){
      console.error("Firebase read failed for " + list.id, err);
      if(view.screen === "home") renderHome();
      else if(view.screen === list.id){ renderList(); setSyncStatus("Connection failed: " + (err && err.message ? err.message : err)); }
    });
  });

  // ---- Home screen events ----
  homeCardsEl.addEventListener("click", function(e){
    var card = e.target.closest("[data-open]");
    if(card) showList(card.getAttribute("data-open"));
  });
  document.getElementById("backBtn").addEventListener("click", showHome);

  // ---- List screen: event delegation ----
  catListEl.addEventListener("click", function(e){
    var listId = view.screen;
    var toggleEl = e.target.closest("[data-toggle]");
    if(toggleEl && !e.target.closest(".item-row")){
      var id = toggleEl.getAttribute("data-toggle");
      view.collapsed[id] = !view.collapsed[id];
      renderList();
      return;
    }
    var removeBtn = e.target.closest("[data-remove]");
    if(removeBtn){
      var removeId = removeBtn.getAttribute("data-remove");
      var catId = removeId.split("-custom-")[0];
      state[listId].custom[catId] = state[listId].custom[catId].filter(function(it){ return it.id !== removeId; });
      delete state[listId].checked[removeId];
      renderList();
      pushState(listId);
      return;
    }
  });

  catListEl.addEventListener("change", function(e){
    var listId = view.screen;
    if(e.target.classList.contains("item-checkbox")){
      var row = e.target.closest(".item-row");
      var id = row.getAttribute("data-id");
      if(e.target.checked){ state[listId].checked[id] = true; } else { delete state[listId].checked[id]; }
      renderList();
      pushState(listId);
    }
  });

  catListEl.addEventListener("submit", function(e){
    var form = e.target.closest("[data-add]");
    if(!form) return;
    e.preventDefault();
    var listId = view.screen;
    var catId = form.getAttribute("data-add");
    var input = form.querySelector(".add-input");
    var name = input.value.trim();
    if(!name) return;
    var newId = catId + "-custom-" + Date.now() + "-" + Math.floor(Math.random()*1000);
    state[listId].custom[catId].push({id:newId, name:name});
    input.value = "";
    renderList();
    pushState(listId);
  });

  document.getElementById("searchInput").addEventListener("input", function(e){
    view.search = e.target.value.trim().toLowerCase();
    renderList();
  });

  document.querySelectorAll(".pill").forEach(function(pill){
    pill.addEventListener("click", function(){
      document.querySelectorAll(".pill").forEach(function(p){ p.setAttribute("aria-pressed","false"); });
      pill.setAttribute("aria-pressed","true");
      view.filter = pill.getAttribute("data-filter");
      renderList();
    });
  });

  document.getElementById("expandAllBtn").addEventListener("click", function(){
    view.collapsed = Object.create(null);
    renderList();
  });
  document.getElementById("collapseAllBtn").addEventListener("click", function(){
    listById[view.screen].categories.forEach(function(c){ view.collapsed[c.id] = true; });
    renderList();
  });
  document.getElementById("printBtn").addEventListener("click", function(){ window.print(); });

  document.getElementById("exportBtn").addEventListener("click", function(){
    var listId = view.screen;
    var payload = {list: listId, checked: state[listId].checked, custom: state[listId].custom, exportedAt: new Date().toISOString()};
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = listId + "-checklist-progress.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importInput").click();
  });
  document.getElementById("importInput").addEventListener("change", function(e){
    var file = e.target.files[0];
    if(!file) return;
    var listId = view.screen;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var data = JSON.parse(evt.target.result);
        state[listId].checked = data.checked || Object.create(null);
        state[listId].custom = data.custom || state[listId].custom;
        listById[listId].categories.forEach(function(c){ if(!state[listId].custom[c.id]) state[listId].custom[c.id] = []; });
        renderList();
        pushState(listId);
      }catch(err){
        alert("That file couldn't be read as a saved checklist. Try exporting a fresh one and re-importing it.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    var listId = view.screen;
    if(!confirm("Reset every checkbox and remove any custom items in this list, for everyone using this link? This can't be undone.")) return;
    state[listId].checked = Object.create(null);
    listById[listId].categories.forEach(function(c){ state[listId].custom[c.id] = []; });
    renderList();
    pushState(listId);
  });

  window.addEventListener("hashchange", function(){
    var h = location.hash.replace("#", "");
    if(h && listById[h]) showList(h); else showHome();
  });

  // ---- Initial route ----
  var initialHash = location.hash.replace("#", "");
  if(initialHash && listById[initialHash]) showList(initialHash); else showHome();
  renderHome();

})();
</script>
</body>
</html>
