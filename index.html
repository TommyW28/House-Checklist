<style>
  :root{
    --ink:#16242E;
    --blueprint:#1F4E66;
    --blueprint-deep:#15394C;
    --paper:#EEF3F6;
    --card:#FFFFFF;
    --line:#C7DCE6;
    --tape:#D9714B;
    --tape-deep:#BD5B38;
    --sage:#5B8266;
    --sage-pale:#E5EEE6;
    --muted:#6E8392;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:920px;margin:0 auto;padding:24px 16px 0;}

  /* ---- Title block (signature element) ---- */
  .titleblock{
    background:var(--blueprint);
    color:#fff;
    border:2px solid var(--blueprint-deep);
    border-radius:6px;
    position:relative;
    overflow:hidden;
  }
  .titleblock::before,.titleblock::after,
  .titleblock .crop-tl,.titleblock .crop-br{
    content:"";position:absolute;width:14px;height:14px;
    border:2px solid rgba(255,255,255,.55);
  }
  .titleblock::before{top:8px;left:8px;border-right:none;border-bottom:none;}
  .titleblock::after{bottom:8px;right:8px;border-left:none;border-top:none;}
  .tb-inner{padding:22px 26px 18px;}
  .tb-eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:#9FC4D6;margin:0 0 6px;
  }
  .tb-title{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(22px,5vw,32px);margin:0 0 16px;line-height:1.15;
  }
  .tb-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    border-top:1px solid rgba(255,255,255,.25);
  }
  .tb-cell{padding:12px 16px;border-right:1px solid rgba(255,255,255,.25);}
  .tb-cell:last-child{border-right:none;}
  .tb-cell-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#9FC4D6;margin:0 0 4px;}
  .tb-cell-value{font-size:18px;font-weight:600;margin:0;}
  .tb-progress-row{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.25);}
  .tb-progress-track{
    height:8px;border-radius:5px;background:rgba(255,255,255,.18);
    overflow:hidden;border:1px solid rgba(255,255,255,.3);
  }
  .tb-progress-fill{
    height:100%;background:var(--tape);width:0%;
    transition:width .3s ease;
  }

  /* ---- Toolbar ---- */
  .toolbar{
    position:sticky;top:0;z-index:5;
    background:var(--paper);
    padding:14px 0;margin-top:18px;
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    border-bottom:1px solid var(--line);
  }
  .search-input{
    flex:1 1 200px;padding:10px 14px;border:1.5px solid var(--blueprint);
    border-radius:6px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);
  }
  .search-input:focus{outline:2px solid var(--tape);outline-offset:1px;}
  .pill-group{display:flex;gap:6px;}
  .pill{
    border:1.5px solid var(--blueprint);background:transparent;color:var(--blueprint);
    padding:9px 13px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
    font-family:inherit;
  }
  .pill[aria-pressed="true"]{background:var(--blueprint);color:#fff;}
  .pill:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  .btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .btn{
    border:1.5px solid var(--blueprint);background:var(--card);color:var(--blueprint);
    padding:8px 13px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;
  }
  .btn:hover{background:var(--blueprint);color:#fff;}
  .btn.tape{border-color:var(--tape-deep);color:var(--tape-deep);}
  .btn.tape:hover{background:var(--tape);color:#fff;border-color:var(--tape);}
  .btn:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  #importInput{display:none;}

  /* ---- Categories ---- */
  .category{
    background:var(--card);border:1.5px solid var(--line);border-radius:8px;
    margin-top:16px;overflow:hidden;
  }
  .cat-header{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;cursor:pointer;background:#F7FAFB;
    border-bottom:1px solid var(--line);user-select:none;
  }
  .cat-header-left{display:flex;align-items:baseline;gap:12px;}
  .cat-num{color:var(--tape-deep);font-size:13px;font-weight:600;}
  .cat-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin:0;}
  .cat-count{font-size:12px;color:var(--muted);white-space:nowrap;}
  .cat-chevron{transition:transform .2s ease;color:var(--blueprint);flex-shrink:0;}
  .category.collapsed .cat-chevron{transform:rotate(-90deg);}
  .category.collapsed .cat-body{display:none;}

  .cat-body{padding:6px 10px 14px;}
  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;}
  @media (max-width:560px){.item-grid{grid-template-columns:1fr;}}

  .item-row{
    display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:6px;
  }
  .item-row.hidden{display:none;}
  .item-row:hover{background:var(--sage-pale);}
  .item-checkbox{
    appearance:none;width:19px;height:19px;flex-shrink:0;
    border:2px solid var(--blueprint);border-radius:4px;cursor:pointer;
    position:relative;background:var(--card);
  }
  .item-checkbox:checked{background:var(--sage);border-color:var(--sage);}
  .item-checkbox:checked::after{
    content:"";position:absolute;left:5px;top:1px;width:5px;height:9px;
    border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(40deg);
  }
  .item-checkbox:focus-visible{outline:2px solid var(--tape);outline-offset:2px;}
  .item-label{font-size:14.5px;cursor:pointer;flex:1;line-height:1.35;}
  .item-row.checked .item-label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sage);}
  .item-remove{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;
    padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0;
  }
  .item-remove:hover{color:var(--tape-deep);background:#fbeae3;}

  .add-row{
    display:flex;gap:8px;padding:10px 8px 4px;margin-top:4px;border-top:1px dashed var(--line);
  }
  .add-input{
    flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;
  }
  .add-input:focus{outline:none;border-color:var(--blueprint);}
  .add-btn{
    border:1.5px solid var(--blueprint);background:var(--card);color:var(--blueprint);
    border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .add-btn:hover{background:var(--blueprint);color:#fff;}

  .empty-msg{
    text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;display:none;
  }

  footer{
    max-width:920px;margin:30px auto 0;padding:0 16px;color:var(--muted);
    font-size:12.5px;text-align:center;
  }

  @media print{
    .toolbar,.add-row,.item-remove,.cat-chevron{display:none !important;}
    .category.collapsed .cat-body{display:block !important;}
    .titleblock{background:#fff !important;color:#000 !important;border-color:#000;}
    .tb-eyebrow,.tb-cell-label{color:#444 !important;}
    body{background:#fff;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="titleblock">
    <span class="crop-tl"></span><span class="crop-br"></span>
    <div class="tb-inner">
      <p class="tb-eyebrow mono">Project / New Home Setup</p>
      <h1 class="tb-title">Everything-to-Buy Checklist</h1>
      <div class="tb-grid">
        <div class="tb-cell">
          <p class="tb-cell-label mono">Categories</p>
          <p class="tb-cell-value mono" id="statCategories">—</p>
        </div>
        <div class="tb-cell">
          <p class="tb-cell-label mono">Items total</p>
          <p class="tb-cell-value mono" id="statTotal">—</p>
        </div>
        <div class="tb-cell">
          <p class="tb-cell-label mono">Checked</p>
          <p class="tb-cell-value mono" id="statChecked">—</p>
        </div>
      </div>
      <div class="tb-progress-row">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span class="mono" style="font-size:11px;color:#9FC4D6;">PROGRESS</span>
          <span class="mono" id="statPercent" style="font-size:11px;">0%</span>
        </div>
        <div class="tb-progress-track"><div class="tb-progress-fill" id="progressFill"></div></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" type="text" placeholder="Search items… (e.g. towels, drill, curtains)" aria-label="Search checklist items">
    <div class="pill-group" role="group" aria-label="Filter by status">
      <button class="pill" data-filter="all" aria-pressed="true">All</button>
      <button class="pill" data-filter="unchecked" aria-pressed="false">To buy</button>
      <button class="pill" data-filter="checked" aria-pressed="false">Got it</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" id="expandAllBtn">Expand all</button>
    <button class="btn" id="collapseAllBtn">Collapse all</button>
    <button class="btn" id="printBtn">Print / save PDF</button>
    <button class="btn" id="exportBtn">Export progress</button>
    <button class="btn" id="importBtn">Import progress</button>
    <input type="file" id="importInput" accept="application/json">
    <button class="btn tape" id="resetBtn">Reset all</button>
  </div>

  <div id="catList"></div>
  <p class="empty-msg" id="emptyMsg">No items match your search.</p>
</div>

<footer>Your checks live in this browser tab only — use <strong>Export progress</strong> before closing the page if you want to pick this up later or on another device.</footer>

<script>
(function(){
  "use strict";

  var CATEGORIES = [
    {id:"essentials", name:"Move-In Day Essentials", items:["Toilet paper","Paper towels","Hand soap","Trash bags","Basic tool kit","Tape measure","Box cutter / utility knife","Flashlight","Batteries (assorted)","First aid kit","Disinfecting wipes","Light bulbs (assorted)","Extension cords","Power strips","Shower curtain & rings","Basic bedding for night one","Phone chargers","Snacks & bottled water","Furniture sliders / pads","Spare keys / lockbox"]},
    {id:"kitchen", name:"Kitchen", items:["Trash can","Recycling bin","Dish soap","Sponges & scrub brush","Dish towels","Drying rack","Pots & pans set","Baking sheets","Mixing bowls","Cutting boards","Knife set","Cooking utensils (spatula, tongs, ladle)","Can opener","Measuring cups & spoons","Colander","Plates, bowls & mugs","Silverware set","Glassware","Coffee maker / kettle","Toaster","Blender","Microwave","Refrigerator","Stove / oven","Dishwasher","Food storage containers","Oven mitts & pot holders","Spice rack & spices","Dish rack mat","Fire extinguisher"]},
    {id:"bathroom", name:"Bathroom", items:["Shower curtain & liner","Bath mat","Towels (bath, hand, wash)","Toilet brush","Plunger","Toilet paper holder","Trash can","Soap dispenser","Toothbrush holder","Bathroom scale","Medicine cabinet basics","Hooks & towel bars","Mirror","Hamper"]},
    {id:"bedroom", name:"Bedroom", items:["Bed frame","Mattress","Mattress protector","Sheets (multiple sets)","Pillows","Pillowcases","Comforter / duvet","Extra blankets","Nightstands","Bedside lamps","Dresser","Hangers","Full-length mirror","Blackout curtains","Alarm clock","Closet storage bins"]},
    {id:"living", name:"Living Room", items:["Sofa / couch","Coffee table","TV stand","Television","Area rug","Curtains or blinds","Throw pillows","Throw blankets","Floor & table lamps","Bookshelf","Side tables","Wall art","Houseplants"]},
    {id:"laundry", name:"Laundry", items:["Washer","Dryer","Laundry detergent","Dryer sheets or balls","Stain remover","Drying rack","Iron & ironing board","Laundry baskets / hampers","Lint roller"]},
    {id:"cleaning", name:"Cleaning Supplies", items:["Vacuum","Mop & bucket","Broom & dustpan","All-purpose cleaner","Glass cleaner","Disinfectant spray / wipes","Sponges","Rubber gloves","Duster","Cleaning caddy","Air freshener","Trash bags (assorted sizes)"]},
    {id:"tools", name:"Tools & Hardware", items:["Hammer","Screwdriver set","Power drill","Level","Tape measure","Pliers","Adjustable wrench","Stud finder","Utility knife","Nails & screws assortment","Picture hanging kit","Step ladder","WD-40 / lubricant","Duct tape","Super glue","Work gloves"]},
    {id:"safety", name:"Safety & Security", items:["Smoke detectors","Carbon monoxide detector","Fire extinguisher","First aid kit","Door & window locks","Deadbolt","Peephole or video doorbell","Security system / cameras","Emergency contact list","Flashlights & batteries","Weather radio"]},
    {id:"office", name:"Home Office & Tech", items:["Desk","Office chair","Monitor","Printer & paper","Filing cabinet","Wifi router","Surge protectors","Desk lamp","Cable organizers","Smart home devices (thermostat, plugs)"]},
    {id:"outdoor", name:"Outdoor & Garage", items:["Garden hose","Lawn mower","Rake & shovel","Outdoor trash cans","Doormat","House numbers","Mailbox","Outdoor furniture","Grill","Garage storage shelves","Outdoor lighting","Snow shovel / ice melt"]},
    {id:"furniture", name:"Furniture & Storage", items:["Dining table & chairs","Bar stools","Entryway bench","Shoe rack","Storage bins","Closet organizers","Shelving units","TV mount"]},
    {id:"decor", name:"Decor & Finishing Touches", items:["Curtains","Area rugs","Wall art & frames","Mirrors","Vases","Decorative pillows","Plants & planters","Candles"]}
  ];

  var state = {
    checked: Object.create(null),   // itemId -> true
    custom: Object.create(null),    // categoryId -> [{id, name}]
    collapsed: Object.create(null), // categoryId -> true
    search: "",
    filter: "all"
  };
  CATEGORIES.forEach(function(c){ state.custom[c.id] = []; });

  var catListEl = document.getElementById("catList");
  var emptyMsgEl = document.getElementById("emptyMsg");

  function allItemsOf(cat){
    var base = cat.items.map(function(name, i){ return {id: cat.id + "-" + i, name: name}; });
    return base.concat(state.custom[cat.id]);
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(ch){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[ch];
    });
  }

  function matchesSearch(name){
    if(!state.search) return true;
    return name.toLowerCase().indexOf(state.search) !== -1;
  }
  function matchesFilter(isChecked){
    if(state.filter === "all") return true;
    if(state.filter === "checked") return isChecked;
    return !isChecked;
  }

  function render(){
    var html = "";
    var totalAll = 0, checkedAll = 0;
    var anyVisible = false;

    CATEGORIES.forEach(function(cat, ci){
      var items = allItemsOf(cat);
      var collapsed = !!state.collapsed[cat.id];
      var catChecked = 0;
      var rows = "";
      var visibleInCat = 0;

      items.forEach(function(item){
        var isChecked = !!state.checked[item.id];
        totalAll++;
        if(isChecked){ checkedAll++; catChecked++; }
        var visible = matchesSearch(item.name) && matchesFilter(isChecked);
        if(visible){ visibleInCat++; anyVisible = true; }
        var isCustom = item.id.indexOf(cat.id + "-custom-") === 0;
        rows += '<div class="item-row ' + (isChecked ? "checked " : "") + (visible ? "" : "hidden") + '" data-id="' + item.id + '">' +
                  '<input type="checkbox" class="item-checkbox" id="cb-' + item.id + '" ' + (isChecked ? "checked" : "") + ' aria-label="' + escapeHtml(item.name) + '">' +
                  '<label class="item-label" for="cb-' + item.id + '">' + escapeHtml(item.name) + '</label>' +
                  (isCustom ? '<button class="item-remove" type="button" data-remove="' + item.id + '" aria-label="Remove ' + escapeHtml(item.name) + '">&times;</button>' : "") +
                '</div>';
      });

      var catNum = String(ci + 1).padStart(2, "0");
      html += '<div class="category ' + (collapsed ? "collapsed" : "") + '" data-cat="' + cat.id + '">' +
                '<div class="cat-header" data-toggle="' + cat.id + '">' +
                  '<div class="cat-header-left">' +
                    '<span class="cat-num mono">' + catNum + '</span>' +
                    '<h2 class="cat-name">' + escapeHtml(cat.name) + '</h2>' +
                  '</div>' +
                  '<div style="display:flex;align-items:center;gap:10px;">' +
                    '<span class="cat-count mono">' + catChecked + '/' + items.length + '</span>' +
                    '<svg class="cat-chevron" width="14" height="14" viewBox="0 0 14 14"><path d="M2 4l5 6 5-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                  '</div>' +
                '</div>' +
                '<div class="cat-body">' +
                  '<div class="item-grid">' + rows + '</div>' +
                  '<form class="add-row" data-add="' + cat.id + '">' +
                    '<input class="add-input" type="text" placeholder="Add your own item…" aria-label="Add item to ' + escapeHtml(cat.name) + '">' +
                    '<button class="add-btn" type="submit">Add</button>' +
                  '</form>' +
                '</div>' +
              '</div>';
      if(visibleInCat === 0){
        // mark whole category hidden when filtered out entirely, unless no search/filter active
      }
    });

    catListEl.innerHTML = html;
    emptyMsgEl.style.display = anyVisible ? "none" : "block";

    document.getElementById("statCategories").textContent = CATEGORIES.length;
    document.getElementById("statTotal").textContent = totalAll;
    document.getElementById("statChecked").textContent = checkedAll;
    var pct = totalAll ? Math.round((checkedAll / totalAll) * 100) : 0;
    document.getElementById("statPercent").textContent = pct + "%";
    document.getElementById("progressFill").style.width = pct + "%";
  }

  // ---- Event delegation ----
  catListEl.addEventListener("click", function(e){
    var toggleId = e.target.closest("[data-toggle]");
    if(toggleId && !e.target.closest(".item-row")){
      var id = toggleId.getAttribute("data-toggle");
      state.collapsed[id] = !state.collapsed[id];
      render();
      return;
    }
    var removeBtn = e.target.closest("[data-remove]");
    if(removeBtn){
      var removeId = removeBtn.getAttribute("data-remove");
      var catId = removeId.split("-custom-")[0];
      state.custom[catId] = state.custom[catId].filter(function(it){ return it.id !== removeId; });
      delete state.checked[removeId];
      render();
      return;
    }
  });

  catListEl.addEventListener("change", function(e){
    if(e.target.classList.contains("item-checkbox")){
      var row = e.target.closest(".item-row");
      var id = row.getAttribute("data-id");
      if(e.target.checked){ state.checked[id] = true; } else { delete state.checked[id]; }
      render();
    }
  });

  catListEl.addEventListener("submit", function(e){
    var form = e.target.closest("[data-add]");
    if(!form) return;
    e.preventDefault();
    var catId = form.getAttribute("data-add");
    var input = form.querySelector(".add-input");
    var name = input.value.trim();
    if(!name) return;
    var newId = catId + "-custom-" + Date.now() + "-" + Math.floor(Math.random()*1000);
    state.custom[catId].push({id:newId, name:name});
    input.value = "";
    render();
  });

  document.getElementById("searchInput").addEventListener("input", function(e){
    state.search = e.target.value.trim().toLowerCase();
    render();
  });

  document.querySelectorAll(".pill").forEach(function(pill){
    pill.addEventListener("click", function(){
      document.querySelectorAll(".pill").forEach(function(p){ p.setAttribute("aria-pressed","false"); });
      pill.setAttribute("aria-pressed","true");
      state.filter = pill.getAttribute("data-filter");
      render();
    });
  });

  document.getElementById("expandAllBtn").addEventListener("click", function(){
    state.collapsed = Object.create(null);
    render();
  });
  document.getElementById("collapseAllBtn").addEventListener("click", function(){
    CATEGORIES.forEach(function(c){ state.collapsed[c.id] = true; });
    render();
  });
  document.getElementById("printBtn").addEventListener("click", function(){ window.print(); });

  document.getElementById("exportBtn").addEventListener("click", function(){
    var payload = {checked: state.checked, custom: state.custom, exportedAt: new Date().toISOString()};
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "house-checklist-progress.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importInput").click();
  });
  document.getElementById("importInput").addEventListener("change", function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var data = JSON.parse(evt.target.result);
        state.checked = data.checked || Object.create(null);
        state.custom = data.custom || state.custom;
        CATEGORIES.forEach(function(c){ if(!state.custom[c.id]) state.custom[c.id] = []; });
        render();
      }catch(err){
        alert("That file couldn't be read as a saved checklist. Try exporting a fresh one and re-importing it.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    if(!confirm("Reset every checkbox and remove any custom items you added? This can't be undone.")) return;
    state.checked = Object.create(null);
    CATEGORIES.forEach(function(c){ state.custom[c.id] = []; });
    render();
  });

  render();
})();
</script>
</body>
</html>
